        /* === RESET & VARS === */
        :root {
            --gold: #008cff;
            --gold-dark: #0b73b8;
            --red: #0056d6;
            --red-dark: #00538b;
            --black: #050505;
            --bg-gradient: linear-gradient(135deg, #0f3966 0%, #000000 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; transition: 0.3s; }
        ul { list-style: none; }

        /* === CONTAINER === */
        #container {
            width: 100%;
            max-width: 480px; /* Mobile Friendly Width */
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        /* === LOGO ANIMATION === */
        .logo-wrapper {
            text-align: center;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo-img {
            filter: drop-shadow(0 0 15px rgba(0, 174, 255, 0.3));
        }

        /* === TITLE === */
        h1.title {
            font-family: 'Orbitron', sans-serif; /* Font Futuristik */
            font-size: 18px;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 25px;
            background: linear-gradient(to right, #fff, var(--gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 153, 255, 0.5);
            line-height: 1.4;
        }

        /* === HERO IMAGE CARD === */
        .hero-card {
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--gold);
            box-shadow: 0 0 30px rgba(0, 93, 214, 0.3); /* Glow Merah */
            margin-bottom: 30px;
            position: relative;
        }
        
        .hero-card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-25deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        /* === BUTTONS (LINKTREE STYLE) === */
        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* Tombol Login (Emas) */
        .btn-login {
            background: linear-gradient(90deg, #10ace9, #00e1ff, #0e7fe9);
            background-size: 200% auto;
            color: #000;
            animation: shimmer 3s linear infinite;
        }

        /* Tombol Daftar (Merah) */
        .btn-daftar {
            background: linear-gradient(90deg, #008cff, #00b7ff, #0099ff);
            background-size: 200% auto;
            color: #fff;
            animation: shimmer 3s linear infinite reverse;
            border-color: rgba(255,255,255,0.2);
        }

        /* Tombol Alternatif (Hitam) */
        .btn-alt {
            background: rgba(255, 255, 255, 0.1);
            color: var(--gold);
            border: 1px solid var(--gold);
            backdrop-filter: blur(5px);
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(0, 174, 255, 0.4);
        }

        /* === FOOTER === */
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #888;
            text-align: center;
        }
        .footer a { color: var(--gold); }

        /* === BACKGROUND PARTICLES (CSS ONLY) === */
        .bg-particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 146, 214, 0.288) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 132, 255, 0.226) 0%, transparent 40%);
            pointer-events: none;
        }
